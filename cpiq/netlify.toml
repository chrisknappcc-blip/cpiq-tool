[build]
  publish = "."

[[headers]]
  for = "/tabs/*"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/data/*"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# Allow CORS for Map Tool router calls (same-site, no issue)
# The iframes use srcdoc so no cross-origin tab loading issues
